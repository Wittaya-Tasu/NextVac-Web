<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextVac - Smart Swine Vaccine System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { color: #0369a1; text-align: center; margin-top: 0; }
        label { font-weight: 600; display: block; margin-top: 15px; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        .round-box { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-top: 15px; background: #f8fafc; }
        .round-title { font-weight: bold; color: #64748b; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        #loading { text-align: center; color: #0284c7; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>💉 NextVac System</h2>
    <div id="loading">กำลังเตรียมข้อมูลระบบ...</div>

    <form id="mainForm" style="display:none;">
        <label>เลือกภาค</label>
        <select id="regionSelect" onchange="updateFarms()">
            <option value="">-- เลือกภาค --</option>
        </select>

        <label>ชื่อฟาร์ม (ที่รับสุกร)</label>
        <select id="farmSelect">
            <option value="">-- กรุณาเลือกภาคก่อน --</option>
        </select>

        <label>ประเภทของสุกร</label>
        <select id="swineType" onchange="updatePrograms()">
            <option value="">-- เลือกประเภท --</option>
            <option value="หย่านม-ขุน : Wean-Finish">หย่านม-ขุน : Wean-Finish</option>
            <option value="อนุบาล-ขุน : Nursery-Finish">อนุบาล-ขุน : Nursery-Finish</option>
            <option value="หย่านม-รุ่นพันธุ์ : Wean-Selection">หย่านม-รุ่นพันธุ์ : Wean-Selection</option>
            <option value="สาวทดแทน : Gilt Repacement">สาวทดแทน : Gilt Repacement</option>
            <option value="พ่อพันธุ์ทดแทน : Boar Repacement">พ่อพันธุ์ทดแทน : Boar Repacement</option>
        </select>

        <label>เลือกโปรแกรมวัคซีน</label>
        <select id="programSelect">
            <option value="">-- กรุณาเลือกประเภทสุกรก่อน --</option>
        </select>

        <div class="round-box">
            <div class="round-title">การรับเข้าครั้งที่ 1</div>
            <label>วันที่รับเข้า</label>
            <input type="date" id="date1">
            <label>จำนวนสุกร (ตัว)</label>
            <input type="number" id="qty1" placeholder="เช่น 350">
        </div>

        <div class="round-box">
            <div class="round-title">การรับเข้าครั้งที่ 2 (ถ้ามี)</div>
            <label>วันที่รับเข้า</label>
            <input type="date" id="date2">
            <label>จำนวนสุกร (ตัว)</label>
            <input type="number" id="qty2" placeholder="เช่น 350">
        </div>

        <button type="submit">บันทึกและสร้างการ์ดโปรแกรม</button>
    </form>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwpvzJEp38w_bFhal93iDQI2MLhdEZZeZ38geKDtVRDEOUQfJBQRdSE6KBHETPfoZx/exec';
    let masterData = { regions: {}, programs: [] };

    window.onload = async () => {
        try {
            const [regRes, progRes] = await Promise.all([
                fetch(SCRIPT_URL + "?action=getRegionsAndFarms").then(r => r.json()),
                fetch(SCRIPT_URL + "?action=getPrograms").then(r => r.json())
            ]);
            
            masterData.regions = regRes.data;
            masterData.programs = progRes.data;

            const regSelect = document.getElementById('regionSelect');
            Object.keys(masterData.regions).forEach(reg => {
                regSelect.add(new Option(reg, reg));
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainForm').style.display = 'block';
        } catch (e) {
            document.getElementById('loading').innerText = "❌ เกิดข้อผิดพลาดในการโหลดข้อมูล";
        }
    };

    function updateFarms() {
        const region = document.getElementById('regionSelect').value;
        const farmSelect = document.getElementById('farmSelect');
        farmSelect.innerHTML = '<option value="">-- เลือกฟาร์ม --</option>';
        if (region && masterData.regions[region]) {
            masterData.regions[region].forEach(f => farmSelect.add(new Option(f, f)));
        }
    }

    function updatePrograms() {
        const type = document.getElementById('swineType').value;
        const progSelect = document.getElementById('programSelect');
        progSelect.innerHTML = '<option value="">-- เลือกโปรแกรม --</option>';
        
        // กรองโปรแกรมที่ตรงกับประเภทสุกรที่เลือก
        const filtered = masterData.programs.filter(p => p.type === type);
        filtered.forEach(p => progSelect.add(new Option(`${p.type} : ${p.name}`, p.id)));
    }
</script>

</body>
</html>
